# Dependabot configuration.
#
# All updates are grouped where possible so we get one PR per ecosystem per
# week instead of one PR per package — fewer rebases, fewer notifications,
# and easier to review against a single test run.

version: 2
updates:
  # ── Go modules at the repo root (omnifin server) ───────────────────────
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "deps(go)"

  # ── npm packages (build-time only — esbuild, tailwind, mjml, swagger UI) ─
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      build-tooling:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "deps(npm)"

  # ── npm packages inside the Tauri desktop client ───────────────────────
  - package-ecosystem: npm
    directory: "/desktop"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      desktop-npm:
        patterns: ["*"]
    commit-message:
      prefix: "deps(desktop)"

  # ── Rust crates inside the Tauri desktop client ────────────────────────
  - package-ecosystem: cargo
    directory: "/desktop/src-tauri"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      desktop-rust:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "deps(desktop-rust)"

  # ── GitHub Actions used by the workflows ───────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "deps(actions)"
