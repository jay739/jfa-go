name: Release desktop client (Tauri)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each runner builds for its own native architecture — Tauri's bundler
          # doesn't handle cross-compile output paths correctly, so we use
          # platform-native runners instead of --target.
          - platform: macos-14            # Apple Silicon
            label: macOS (Apple Silicon)
          - platform: macos-13            # Intel Mac
            label: macOS (Intel)
          - platform: ubuntu-22.04
            label: Linux x86_64
          - platform: windows-latest
            label: Windows x86_64
    runs-on: ${{ matrix.platform }}
    name: Build for ${{ matrix.label }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Tauri 2.x uses libayatana-appindicator3-dev; the older
          # libappindicator3-dev conflicts with it and must not be installed.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-${{ matrix.platform }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps (for Tauri CLI)
        working-directory: desktop
        run: npm install

      # Inject the git tag into the desktop client version so the .dmg/.exe
      # filenames and Info.plist match the omnifin release version, without
      # us having to remember to bump tauri.conf.json + Cargo.toml each time.
      - name: Sync desktop version from tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting desktop version to ${VERSION}"
          # Portable across GNU sed (Linux/Windows runners) and BSD sed (macOS):
          #  - no 0,/pattern/ address (BSD sed errors on it)
          #  - the regex below is unique enough that matching all occurrences is safe:
          #    tauri.conf.json has exactly one "version": "x.y.z"; Cargo.toml has
          #    exactly one line that starts with `version = "..."` at column 0
          #    (dependency versions use the inline `{ version = "..." }` form).
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" \
            desktop/src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \"[^\"]*\"$/version = \"${VERSION}\"/" \
            desktop/src-tauri/Cargo.toml
          rm -f desktop/src-tauri/tauri.conf.json.bak desktop/src-tauri/Cargo.toml.bak
          echo "After sync:"
          grep '"version"' desktop/src-tauri/tauri.conf.json | head -1
          grep '^version' desktop/src-tauri/Cargo.toml | head -1

      - name: Build & upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_BACKTRACE: "1"
          # Tauri reads these env vars to set the version in the .app/.msi/.deb metadata.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tauriScript: npm run tauri --
          args: ""
          # Reuse the GitHub Release created by the other release workflows
          # (release.yml + docker-publish.yml) instead of creating our own.
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
