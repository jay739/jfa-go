name: Release desktop binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  # Builds everything goreleaser is currently configured for from a single Linux
  # runner using the upstream prebuilt build container (which already has Go,
  # Node, mingw, libolm, the ARM/ARM64 cross-compilers, etc.).
  #
  # Produced artifacts (per the .goreleaser.yml in this repo):
  #   - omnifin_<ver>_Linux_x86_64.zip       (CLI / server binary)
  #   - omnifin_<ver>_Linux_arm64.zip
  #   - omnifin_<ver>_Linux_arm.zip
  #   - omnifin_<ver>_Windows_x86_64.zip
  #   - omnifin_<ver>_Windows_arm64.zip
  #   - omnifin_<ver>_macOS_x86_64.zip
  #   - omnifin_<ver>_macOS_arm64.zip
  #   - omnifin_<ver>_TrayIcon_Linux_x86_64.zip
  #   - omnifin_<ver>_TrayIcon_Windows_x86_64.zip
  #   - omnifin_<ver>_MatrixE2EE_Linux_*.zip
  #   - omnifin-tray_*.deb / .rpm / .apk
  #   - omnifin_*.deb / .rpm / .apk
  #   - checksums.txt
  #
  # macOS tray icon binary is NOT built here — needs the Cocoa SDK which only
  # exists on macOS runners. Added in a follow-up release.
  goreleaser:
    runs-on: ubuntu-latest
    container:
      image: docker.io/hrfee/jfa-go-build-docker:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Mark workspace safe for git inside container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install genisoimage (mkisofs) for DMG creation
        run: |
          if command -v apt-get >/dev/null; then
            apt-get update && apt-get install -y --no-install-recommends genisoimage
          elif command -v apk >/dev/null; then
            apk add --no-cache cdrkit
          fi
          command -v mkisofs || command -v genisoimage || echo "mkisofs not available — DMG step may fail"

      - name: Run goreleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JFA_GO_BUILT_BY: github-actions
          INTERNAL: "off"
          UPDATER: "off"
        run: ./scripts/version.sh goreleaser release --clean --skip=validate

      # Bundle each macOS binary into a basic .dmg via mkisofs and attach to
      # the GitHub Release that goreleaser just created. The DMG is read-only,
      # contains the binary + LICENSE + README, and works with macOS's
      # built-in Disk Utility / Finder. For a fancier installer (volume icon,
      # background image, Applications drag-link) macOS-runner builds are
      # needed; this is the cross-platform-friendly baseline.
      - name: Package macOS binaries as .dmg and upload
        # The hrfee build container's default shell is sh which doesn't have
        # `shopt`. Force bash so `nullglob` and other modern features work.
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          MKISOFS="$(command -v mkisofs || command -v genisoimage || true)"
          if [ -z "${MKISOFS}" ]; then
            echo "mkisofs/genisoimage not found — skipping DMG creation"
            exit 0
          fi
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          shopt -s nullglob
          dirs=(dist/notray_darwin_*)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "no dist/notray_darwin_* directories — nothing to package"
            exit 0
          fi
          for bin_dir in "${dirs[@]}"; do
            ARCH=$(basename "$bin_dir" | sed 's/^notray_darwin_//')
            STAGE="dmg-stage-${ARCH}"
            DMG="dist/omnifin_${VERSION}_macOS_${ARCH}.dmg"
            rm -rf "$STAGE" "$DMG"
            mkdir -p "$STAGE/Omnifin"
            cp "$bin_dir"/* "$STAGE/Omnifin/omnifin"
            cp LICENSE "$STAGE/Omnifin/" 2>/dev/null || true
            cp README.md "$STAGE/Omnifin/" 2>/dev/null || true
            chmod +x "$STAGE/Omnifin/omnifin"
            "$MKISOFS" -V "Omnifin ${VERSION}" -r -apple -no-pad -o "$DMG" "$STAGE"
            echo "Built: $DMG"
            gh release upload "$TAG" "$DMG" --clobber
            rm -rf "$STAGE"
          done
