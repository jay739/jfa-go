name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install npm deps
        run: npm ci || npm install

      - name: Install swag
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.4
          # setup-go adds ~/go/bin to PATH for subsequent steps, but be explicit:
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build all (docs + web assets + binary)
        run: make all

      - name: Go vet
        run: go vet -tags "e2ee goolm" ./...

      - name: Go test
        run: go test -tags "e2ee goolm" -p 1 ./...
