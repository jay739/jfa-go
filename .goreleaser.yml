# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
#
# Slim goreleaser config — produces only the assets users actually pick up
# from a GitHub Release. Docker Hub is the primary distribution channel for
# the server; these archives + .deb/.rpm are fallbacks for bare-metal installs.
#
# Intentionally dropped (vs upstream jfa-go):
#   - macOS/Windows server builds (Docker is the way; users running Mac/Win
#     servers are vanishingly rare)
#   - 32-bit ARM (Pi 1/2/Zero)
#   - Tray-icon server variants (niche — the Tauri desktop client now covers
#     "give me a windowed Omnifin" much better)
#   - Matrix E2EE Linux builds (niche feature, special CGO toolchain)
#   - .apk (Alpine) format from nfpm (collides with Android APK extension and
#     confuses users)
#   - macOS post-step DMGs (the Tauri release workflow ships proper .dmgs for
#     the desktop client — server DMGs were just the binary in a disk image
#     and added noise)
version: 2
project_name: omnifin
release:
    github:
        owner: jay739
        name: omnifin
    name_template: "v{{.Version}}"
before:
  hooks:
    - npm ci
    - env GOOS= GOARCH= make precompile
builds:
    - id: notray
      dir: ./
      flags:
        - -tags={{ .Env.JFA_GO_TAG }}
      ldflags:
        - -X main.version={{.Env.JFA_GO_VERSION}} -X main.commit={{.ShortCommit}} -X main.updater={{.Env.JFA_GO_UPDATER}} {{.Env.JFA_GO_STRIP}} -X main.cssVersion={{.Env.JFA_GO_CSS_VERSION}} -X main.buildTimeUnix={{.Env.JFA_GO_BUILD_TIME}} -X main.builtBy="{{.Env.JFA_GO_BUILT_BY}}"
      goos:
        - linux
      goarch:
        - amd64
        - arm64
archives:
  - id: notray
    ids:
        - notray
    formats: [ "tar.gz" ]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_Linux_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
checksum:
    name_template: 'checksums.txt'
snapshot:
    version_template: "0.0.0-{{ .Env.JFA_GO_NFPM_EPOCH }}"
changelog:
    sort: asc
    filters:
        exclude:
            - '^docs:'
            - '^test:'
nfpms:
  - id: notray
    file_name_template: '{{ .ProjectName }}_{{ .Arch }}_{{ if .IsSnapshot }}{{ .ShortCommit }}{{ else }}v{{ .Version }}{{ end }}'
    package_name: omnifin
    homepage: https://github.com/jay739/omnifin
    description: A Jellyfin user management web app.
    maintainer: Jayakrishna Konda <contact@jay739.dev>
    license: MIT
    vendor: jay739.dev
    version_metadata: git
    ids:
      - notray
    contents:
      - src: ./LICENSE
        dst: /usr/share/licenses/omnifin
    formats:
      - deb
      - rpm
