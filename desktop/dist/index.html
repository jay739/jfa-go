<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Omnifin — Connect</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #08080a;
        color: #f9fafb;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .card {
        max-width: 480px;
        width: 100%;
        background: #12121a;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        padding: 32px 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      h1 {
        margin: 0 0 6px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .sub {
        color: #9ca3af;
        font-size: 14px;
        margin: 0 0 22px;
        line-height: 1.55;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        color: #a5b4fc;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      input[type="url"] {
        width: 100%;
        background: #1e1e28;
        color: #f9fafb;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 11px 14px;
        font-size: 15px;
        outline: none;
        transition: border-color 0.15s ease;
      }
      input[type="url"]:focus {
        border-color: #6366f1;
      }
      .hint {
        color: #6b7280;
        font-size: 12px;
        margin: 8px 0 0;
      }
      button {
        width: 100%;
        margin-top: 18px;
        padding: 11px 16px;
        background: #6366f1;
        color: #fff;
        border: 0;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover { background: #4f46e5; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .error {
        margin-top: 12px;
        font-size: 13px;
        color: #fca5a5;
        background: rgba(239, 68, 68, 0.08);
        border-left: 3px solid rgba(239, 68, 68, 0.6);
        padding: 8px 12px;
        border-radius: 6px;
        display: none;
      }
      .error.show { display: block; }
      .foot {
        margin-top: 22px;
        text-align: center;
        font-size: 11px;
        color: #4b5563;
      }
      .foot a { color: #6b7280; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Connect to your Omnifin server</h1>
        <p class="sub">Enter the URL where you've self-hosted Omnifin. This app is a native window onto that server — you only need to do this once.</p>
        <label for="url">Server URL</label>
        <input id="url" type="url" placeholder="https://omnifin.example.com" autofocus />
        <p class="hint">Examples: <code>https://jfaccounts.yourdomain.com</code>, <code>http://192.168.1.10:8056</code></p>
        <button id="connect" type="button">Connect</button>
        <div class="error" id="error"></div>
        <p class="foot">Don't have an Omnifin server yet? <a href="https://github.com/jay739/omnifin" target="_blank">github.com/jay739/omnifin</a></p>
      </div>
    </div>
    <script>
      const { invoke } = window.__TAURI__.core;
      const input = document.getElementById("url");
      const btn = document.getElementById("connect");
      const err = document.getElementById("error");

      function showError(msg) {
        err.textContent = msg;
        err.classList.add("show");
      }
      function clearError() {
        err.classList.remove("show");
      }

      async function connect() {
        clearError();
        let url = input.value.trim();
        if (!url) {
          showError("Please enter a URL.");
          return;
        }
        if (!/^https?:\/\//i.test(url)) {
          url = "https://" + url;
        }
        btn.disabled = true;
        btn.textContent = "Checking…";
        // Best-effort reachability check; some servers may block CORS so we tolerate failures.
        try {
          await fetch(url, { method: "HEAD", mode: "no-cors" });
        } catch (_) {
          /* ignore — Tauri webview will surface real errors via the network */
        }
        try {
          await invoke("set_server_url", { url });
          // The Rust handler navigates the window; nothing else to do here.
        } catch (e) {
          btn.disabled = false;
          btn.textContent = "Connect";
          showError(String(e));
        }
      }

      btn.addEventListener("click", connect);
      input.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") connect();
      });

      // If a URL is already saved (e.g. user reopened the setup page from menu),
      // pre-fill the input.
      (async () => {
        try {
          const saved = await invoke("get_server_url");
          if (saved) input.value = saved;
        } catch (_) {}
      })();
    </script>
  </body>
</html>
